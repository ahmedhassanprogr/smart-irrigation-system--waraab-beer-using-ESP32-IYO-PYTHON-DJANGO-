<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smart waraab systems</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    
    <div class="container mt-5">
        <h1 class="text-center">Smart Waraab Systems Dashboard</h1>
        {% if latest_status %}
            <div class="alert alert-info mt-4">
                <h4>Latest Pump Status:</h4>
                <p>Status: {{ latest_status.pumb_on|yesno:"On,Off" }}</p>
                <p>Updated At: {{ latest_status.updated_at }}</p>
            </div>
        {% else %}
            <div class="alert alert-warning mt-4">
                No pump status data available.
            </div>
        {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
